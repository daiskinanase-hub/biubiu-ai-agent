server {
    listen       80;
    # 域名配置：建议改为你的真实域名
    server_name  你的域名 www.你的域名;

    # 允许上传最大文件尺寸
    client_max_body_size 50M;

    root   /usr/share/nginx/html;

    # 1. 处理 Vue Router History 模式
    location / {
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 3. 反向代理后端 API（AI 服务 - yu-ai-agent）
    # 关键修改点：改用正则匹配 ^/api/，避免 /kb-api/v1/... 被 /api/ prefix 抢走
    location ~ ^/api/ {
        # 重要：proxy_pass 末尾绝对不要加斜杠！
        # 错误：http://yu-ai-agent:8123/;  -> 会抹除/api/，导致后端找不到 context-path
        # 正确：http://yu-ai-agent:8123;   -> 会保留/api/，完整传递给后端
        proxy_pass http://yu-ai-agent:8123;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 3. Spring AI 流式输出 (SSE) 专属优化
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;    # 必须关闭，否则 AI 响应会因 2G 内存缓冲而卡顿
        proxy_cache off;        # 禁用缓存
        chunked_transfer_encoding on;

        # 针对 AI 思考耗时较长，防止 Nginx 提前断开连接
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # 4. 反向代理知识库服务 API（RAG ETL - rag-etl-pipeline）
    # 前端请求 /kb-api/xxx -> nginx 去掉 /kb-api 前缀 -> rag 服务 /api/v1/xxx
    location /kb-api/ {
        # 末尾带斜杠，nginx 自动将 /kb-api/v1/xxx -> /api/v1/xxx
        proxy_pass http://rag-etl-pipeline:10201/api;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式响应优化
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # 5. 静态资源缓存优化
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public";
    }
}