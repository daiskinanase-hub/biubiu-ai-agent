server:
  port: 10201

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  application:
    name: rag-etl-pipeline
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    # 数据库密码：请输入你的数据库密码
    password: ${DB_PASSWORD:请输入你的数据库密码}
  ai:
    dashscope:
      # DashScope API Key：请输入你的 DashScope API Key
      # 获取地址：https://dashscope.console.aliyun.com/apiKey
      api-key: ${DASHSCOPE_API_KEY:请输入你的 DashScope API Key}
      chat:
        options:
          model: qwen-turbo
      embedding:
        options:
          model: text-embedding-v1
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        initialize-schema: false

# 百炼 DataCenter 文档解析（与 DashScope API Key 配合，路径同官方 LlamaIndex 阅读器）
rag:
  dashscope:
    base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
    category-id: ${DASHSCOPE_CATEGORY_ID:default}
    # 工作空间ID：请输入你的百炼工作空间ID
    workspace-id: ${DASHSCOPE_WORKSPACE_ID:请输入你的百炼工作空间ID}
    parser: DASHSCOPE_DOCMIND
    poll-interval-seconds: 5
    max-wait-seconds: 3600
  query:
    generation-model: qwen3-max
    rerank-model: qwen3-rerank
    rerank-top-n: 5
    rerank-min-score: 0.3
    rerank-api-url: https://dashscope.aliyuncs.com/compatible-api/v1/reranks
    vector-search-top-k: 10

aliyun:
  bailian:
    region-id: ${ALIYUN_REGION_ID:cn-hangzhou}
    # 阿里云 AccessKey ID：请输入你的阿里云 AccessKey ID
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:请输入你的阿里云 AccessKey ID}
    # 阿里云 AccessKey Secret：请输入你的阿里云 AccessKey Secret
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:请输入你的阿里云 AccessKey Secret}
